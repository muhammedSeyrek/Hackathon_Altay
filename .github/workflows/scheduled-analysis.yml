name: Zamanlanmış Log Analizi

# Repo'daki bir log dosyasını analiz edip Telegram grubuna grafik+özet+öneri gönderir.
on:
  workflow_dispatch:
    inputs:
      log_path:
        description: "Analiz edilecek log dosyasının yolu (repo'ya göre)"
        required: true
        default: "sample.log"
  schedule:
    - cron: '0 6 * * *'   # her gün 06:00 UTC (TR saatiyle 09:00). İstersen değiştir.

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python run_analysis.py "${{ github.event.inputs.log_path || 'sample.log' }}"
name: Otomatik Log Analizi

# Üç tetikleyici:
# 1) Her commit/push - kod veya log değişince otomatik çalışır
# 2) Manuel - Actions sekmesinden tek tıkla
# 3) Cron - her gün 06:00 UTC (TR 09:00)
on:
  push:
    branches: [main, master]
    # Tek dosya değişse bile çalışsın - filtre koymuyoruz
  workflow_dispatch:
    inputs:
      log_path:
        description: "Analiz edilecek log dosyasının yolu"
        required: true
        default: "sample.log"
  schedule:
    # - cron: '0 1 * * *'

# Aynı anda iki analiz çalışmasın
concurrency:
  group: log-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Manuel input varsa onu, yoksa sample.log
          LOG_PATH="${{ github.event.inputs.log_path }}"
          if [ -z "$LOG_PATH" ]; then
            LOG_PATH="sample.log"
          fi
          echo "Analiz edilecek dosya: $LOG_PATH"
          python run_analysis.py "$LOG_PATH"
